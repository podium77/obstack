parameters:
    app.platform_base_url: '%env(APP_BASE_URL)%'
    app.mail_from:  '%env(MAIL_FROM)%'
    app.mail_admin: '%env(MAIL_ADMIN)%'
    app.slack_webhook_url: '%env(default::WEBHOOK_SLACK_URL)%'
    app.teams_webhook_url: '%env(default::WEBHOOK_TEAMS_URL)%'
    app.obs_agent_artifact_base_url: '%env(default::OBS_AGENT_ARTIFACT_BASE_URL)%'
    app.obs_agent_pubkey_url: '%env(default::OBS_AGENT_PUBKEY_URL)%'
    app.obs_agent_pubkey_fingerprint: '%env(default::OBS_AGENT_PUBKEY_FINGERPRINT)%'
    app.encryption_key: '%env(APP_ENCRYPTION_KEY)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Enum/'
            - '../src/Kernel.php'

    'App\Twig\Extension\obstackExtension':
        tags: ['twig.extension']

    # Générateur de scripts d'agent
    App\Service\AgentInstallScriptGenerator:
        arguments:
            $platformBaseUrl: '%app.platform_base_url%'
            $platformApiVersion: 'v1'
            $agentArtifactBaseUrl: '%app.obs_agent_artifact_base_url%'
            $agentPubkeyUrl: '%app.obs_agent_pubkey_url%'
            $agentPubkeyFingerprint: '%app.obs_agent_pubkey_fingerprint%'

    # Service de notifications
    App\Service\NotificationService:
        arguments:
            # $mailFrom:          '%app.mail_from%'
            $defaultSender: '%app.mail_from%'
            $mailAdmin:         '%app.mail_admin%'
            $slackWebhookUrl:   '%app.slack_webhook_url%'
            $teamsWebhookUrl:   '%app.teams_webhook_url%'

    # Service de chiffrement des mots de passe
    App\Service\PasswordEncryptionService:
        arguments:
            $encryptionKey: '%app.encryption_key%'

    # Contexte tenant (scope request)
    App\Service\TenantContext:
        shared: false

    # Authentificateur multi-tenant
    App\Security\MultiTenantAuthenticator: ~

    # Collecteur Kubernetes
    App\Kubernetes\KubernetesCollector: ~

    # Services RCA
    App\RCA\PyRcaService: ~
    App\RCA\KnowledgeGraphService: ~

    # Agent SSH
    App\Agent\SshClient:
        arguments:
            $connectTimeoutSeconds: 10

    # Services de monitoring
    App\Service\Monitoring\PrometheusService: ~
    App\Service\Monitoring\OpenTelemetryService: ~
    App\Service\Monitoring\LokiService: ~
    App\Service\Monitoring\JaegerService: ~

    # Service JWT pour l'authentification API
    App\Service\JwtTokenService:
        arguments:
            $jwtSecret: '%env(JWT_SECRET)%'
            $jwtAlgorithm: 'HS256'
            $tokenExpiry: 3600

    # Authenticateur JWT
    App\Security\JwtAuthenticator:
        tags:
            - { name: security.authenticator }
